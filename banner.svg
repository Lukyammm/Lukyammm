<svg width="850" height="280" viewBox="0 0 850 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e" />
      <stop offset="50%" stop-color="#12141d" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    .title { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 58px; font-weight: 800; fill: url(#textGrad); }
    .subtitle { font-family: 'Inter', -apple-system, sans-serif; font-size: 18px; font-weight: 600; fill: #8b949e; letter-spacing: 5px; text-transform: uppercase; }
    .tagline { font-family: 'Inter', -apple-system, sans-serif; font-size: 15px; font-weight: 400; fill: #6e7681; }
    
    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes draw {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    
    .shape1 { animation: float 6s ease-in-out infinite; transform-origin: center; }
    .shape2 { animation: float 8s ease-in-out infinite reverse; transform-origin: center; }
    .glow-circle { animation: pulse 4s ease-in-out infinite; transform-origin: center; }
    .chart-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 2s ease-out forwards; }
  </style>

  <!-- Base Background -->
  <rect width="850" height="280" rx="16" fill="url(#bg)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Grid Overlay -->
  <rect width="850" height="280" rx="16" fill="url(#grid)" />

  <!-- Abstract Tech/Data Shapes (Glowing Orbs) -->
  <g class="shape1">
    <circle cx="750" cy="80" r="140" fill="url(#accent)" filter="blur(50px)" />
  </g>
  <g class="shape2">
    <circle cx="100" cy="220" r="160" fill="url(#accent)" filter="blur(60px)" />
  </g>

  <!-- Stylized Data Chart Line -->
  <path class="chart-line" d="M 0 250 L 150 200 L 250 220 L 350 150 L 450 180 L 550 100 L 650 130 L 750 50 L 850 80" fill="none" stroke="rgba(79, 172, 254, 0.25)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Data Nodes on the Chart -->
  <circle cx="350" cy="150" r="4" fill="#00F2FE" class="glow-circle" filter="url(#glow)"/>
  <circle cx="550" cy="100" r="4" fill="#00F2FE" class="glow-circle" filter="url(#glow)" style="animation-delay: 1s;"/>
  <circle cx="750" cy="50" r="4" fill="#00F2FE" class="glow-circle" filter="url(#glow)" style="animation-delay: 2s;"/>

  <!-- Content Group -->
  <g transform="translate(425, 120)">
    <text x="0" y="0" class="title" text-anchor="middle" filter="url(#glow)">Lukyam Madeira</text>
    <text x="0" y="45" class="subtitle" text-anchor="middle">Analista de Dados &amp; Desenvolvedor</text>
    
    <!-- Divider Line -->
    <rect x="-150" y="75" width="300" height="1" fill="rgba(255,255,255,0.1)" />
    
    <text x="0" y="105" class="tagline" text-anchor="middle">Transformando complexidade em inteligência através de dados.</text>
  </g>
</svg>
